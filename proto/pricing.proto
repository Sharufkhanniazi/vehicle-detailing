syntax = "proto3";

package pricing;

enum VehicleCategory {
    SMALL = 0;
    SEDAN = 1;
    SUV = 2;
    TRUCK = 3;
}

enum ServiceType {
    ExteriorWash = 0;
    InteriorClean = 1;
    FullDetailing = 2;
    EngineBayCleaning = 3;
}

service PricingService {
    rpc GetEstimate (PriceEstimateRequest)
        returns (PriceEstimateResponse);
}

message PriceEstimateRequest {
    VehicleCategory vehicle = 3;
    repeated ServiceType services = 4;
}

message PriceEstimateResponse {
    string estimate_id = 1;
    string currency = 2;

    double subtotal = 3;
    double tax = 4;
    double surge_multiplier = 5;
    double total = 6;

    repeated ServiceBreakdown services = 7;

    string expires_at = 8;
}

message ServiceBreakdown {
    string service_id = 1;
    string service_name = 2;
    double base_price = 3;
    double final_price = 4;
}

